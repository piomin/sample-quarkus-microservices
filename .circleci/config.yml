version: 2.1

jobs:
  analyze:
    executor:
      name: docker/docker
      tag: '3.6'
    steps:
      - checkout
      - docker/install_docker_tools
      - maven/with_cache:
          steps:
            - run:
                name: Build Images
                command: mvn package -DskipTests -Dquarkus.container-image.build=true
      - run:
          name: Run Pact Broker
          command: docker-compose up -d
      - maven/with_cache:
          steps:
            - run:
                name: Run Tests
                command: mvn package pact:publish -Dquarkus.container-image.build=false
      - maven/with_cache:
          steps:
            - run:
                name: Sonar Analysis
                command: mvn package sonar:sonar -DskipTests -Dquarkus.container-image.build=false

executors:
  machine:
    machine:
      image: ubuntu-2204:current
    environment:
      architecture: "amd64"
      platform: "linux/amd64"

orbs:
  maven: circleci/maven@2.1.1
  docker: circleci/docker@3.0.1

workflows:
  maven_test:
    jobs:
      - analyze:
          context: SonarCloud
